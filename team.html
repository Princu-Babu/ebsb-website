<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Our Team | EBSB Club</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .team-poster {
      border-radius: 16px;
      overflow: hidden;
      box-shadow: var(--shadow-md);
      transition: transform 0.3s ease, box-shadow 0.3s ease;
      background: var(--white);
    }
    .team-poster:hover {
      transform: translateY(-10px);
      box-shadow: 0 20px 40px rgba(0,0,0,0.15);
    }
    .team-poster img {
      width: 100%;
      height: auto;
      display: block;
    }
  </style>
</head>
<body>
  <div class="page-transition"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo" style="display: flex; align-items: center; gap: 10px;">
        <img src="images/iitj_logo.jpg" alt="IIT Jammu Logo" style="height: 40px; width: auto; border-radius: 4px;">
        <img src="images/ebsb_logo.jpg" alt="EBSB Logo" style="height: 40px; width: auto; border-radius: 4px;">
        <span>EBSB <span style="color: var(--saffron);">IIT Jammu</span></span>
      </a>
      <button class="mobile-menu-btn" aria-label="Toggle Menu"><i class="fa-solid fa-bars"></i></button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="team.html" class="active">Team</a></li>
        <li><a href="gallery.html">Gallery</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="achievements.html">Achievements</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="page-header slide-in-left">
    <div class="container">
      <h1>Meet Our Team</h1>
      <p>The passionate individuals driving the Ek Bharat Shreshtha Bharat vision forward.</p>
    </div>
  </header>

  <!-- Team Gallery -->
  <section class="bg-white" style="padding-top: 40px; padding-bottom: 80px;">
    <div class="container">
      <div class="grid" style="grid-template-columns: repeat(auto-fit, minmax(320px, 1fr)); gap: 40px;">
        
        <div class="team-poster slide-up delay-100">
          <img src="team/Coordinator.PNG" alt="Coordinator">
        </div>
        
        <div class="team-poster slide-up delay-100">
          <img src="team/CORE TEAM HEAD.PNG" alt="Core Team Head">
        </div>

        <div class="team-poster slide-up delay-100">
          <img src="team/CORE TEAM HEAD (2).PNG" alt="Core Team Head (2)">
        </div>

        <div class="team-poster slide-up delay-200">
          <img src="team/CORE TEAM MEMBER.PNG" alt="Core Team Member">
        </div>

        <div class="team-poster slide-up delay-200">
          <img src="team/CLUB COLLABORATION HEAD.PNG" alt="Club Collaboration Head">
        </div>

        <div class="team-poster slide-up delay-200">
          <img src="team/DESIGN HEAD.PNG" alt="Design Head">
        </div>

        <div class="team-poster slide-up delay-300">
          <img src="team/Design and web-d head.PNG" alt="Design and Web-D Head">
        </div>

        <div class="team-poster slide-up delay-300">
          <img src="team/EVENT MANAGEMENT HEAD.PNG" alt="Event Management Head">
        </div>

        <div class="team-poster slide-up delay-300">
          <img src="team/EVENT MANAGEMENT HEAD (2).PNG" alt="Event Management Head (2)">
        </div>

        <div class="team-poster slide-up delay-400">
          <img src="team/Inventory head.PNG" alt="Inventory Head">
        </div>

        <div class="team-poster slide-up delay-400">
          <img src="team/Media coverage head.PNG" alt="Media Coverage Head">
        </div>

        <div class="team-poster slide-up delay-400">
          <img src="team/OUTREACH HEAD.PNG" alt="Outreach Head">
        </div>

        <div class="team-poster slide-up delay-400">
          <img src="team/social media head.PNG" alt="Social Media Head">
        </div>

      </div>
    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 EBSB Club, IIT Jammu. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
