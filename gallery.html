<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gallery | EBSB Club</title>
  <link rel="stylesheet" href="css/style.css">
  <link rel="stylesheet" href="css/animations.css">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
  <style>
    .gallery-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
      gap: 20px;
    }
    .gallery-item {
      position: relative;
      border-radius: 12px;
      overflow: hidden;
      aspect-ratio: 4/3;
      background-color: var(--light-gray);
      display: flex;
      align-items: center;
      justify-content: center;
      color: #94a3b8;
      cursor: pointer;
    }
    .gallery-item:hover .gallery-overlay {
      opacity: 1;
    }
    .gallery-overlay {
      position: absolute;
      inset: 0;
      background: rgba(0,0,128,0.7);
      display: flex;
      align-items: center;
      justify-content: center;
      opacity: 0;
      transition: opacity 0.3s;
      color: var(--white);
      font-size: 1.5rem;
    }
    .category-tabs {
      display: flex;
      justify-content: center;
      gap: 15px;
      margin-bottom: 40px;
      flex-wrap: wrap;
    }
    .tab-btn {
      padding: 10px 24px;
      border-radius: 30px;
      background: var(--white);
      border: 1px solid var(--border-color);
      cursor: pointer;
      font-weight: 500;
      transition: all 0.3s;
    }
    .tab-btn.active, .tab-btn:hover {
      background: var(--green);
      color: var(--white);
      border-color: var(--green);
    }
  </style>
</head>
<body>
  <div class="page-transition"></div>

  <!-- Navigation -->
  <nav class="navbar">
    <div class="container">
      <a href="index.html" class="logo">
        <div class="logo-icon"><i class="fa-solid fa-hands-holding-circle"></i></div>
        <span>EBSB <span style="color: var(--saffron);">IIT Jammu</span></span>
      </a>
      <button class="mobile-menu-btn" aria-label="Toggle Menu"><i class="fa-solid fa-bars"></i></button>
      <ul class="nav-links">
        <li><a href="index.html">Home</a></li>
        <li><a href="about.html">About Us</a></li>
        <li><a href="events.html">Events</a></li>
        <li><a href="team.html">Team</a></li>
        <li><a href="gallery.html" class="active">Gallery</a></li>
        <li><a href="blog.html">Blog</a></li>
        <li><a href="resources.html">Resources</a></li>
        <li><a href="achievements.html">Achievements</a></li>
        <li><a href="contact.html">Contact</a></li>
      </ul>
    </div>
  </nav>

  <!-- Page Header -->
  <header class="page-header slide-in-left">
    <div class="container">
      <h1>Media Gallery</h1>
      <p>Relive the moments from our events, workshops, and celebrations.</p>
    </div>
  </header>

  <!-- Gallery Section -->
  <section class="bg-white">
    <div class="container">
      
      <div class="category-tabs slide-up">
        <button class="tab-btn active">All</button>
        <button class="tab-btn">Photos</button>
        <button class="tab-btn">Videos</button>
        <button class="tab-btn">Posters</button>
      </div>

      <div class="gallery-grid slide-up delay-100">
        <!-- Gallery Items -->
        <div class="gallery-item">
          <i class="fa-solid fa-image fa-3x"></i>
          <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
        </div>
        <div class="gallery-item">
          <i class="fa-solid fa-image fa-3x"></i>
          <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
        </div>
        <div class="gallery-item">
          <i class="fa-solid fa-video fa-3x"></i>
          <div class="gallery-overlay"><i class="fa-solid fa-play"></i></div>
        </div>
        <div class="gallery-item">
          <i class="fa-solid fa-image fa-3x"></i>
          <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
        </div>
        <div class="gallery-item">
          <i class="fa-solid fa-image fa-3x"></i>
          <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
        </div>
        <div class="gallery-item">
          <i class="fa-solid fa-file-invoice fa-3x"></i>
          <div class="gallery-overlay"><i class="fa-solid fa-magnifying-glass-plus"></i></div>
        </div>
      </div>

    </div>
  </section>

  <!-- Footer -->
  <footer class="footer">
    <div class="container">
      <div class="footer-bottom">
        <p>&copy; 2026 EBSB Club, IIT Jammu. All rights reserved.</p>
      </div>
    </div>
  </footer>

  <script src="js/main.js"></script>
</body>
</html>
